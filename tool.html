<!DOCTYPE html>
<html lang="zh-cmn-Hans">

<head>
  <meta charset="UTF-8">
  <link rel="dns-prefetch" href="//s1.tool.lu">
  <link rel="dns-prefetch" href="//s2.tool.lu">
  <link rel="dns-prefetch" href="//s3.tool.lu">
  <link rel="dns-prefetch" href="//s4.tool.lu">
  <link rel="dns-prefetch" href="//qn11.tool.lu">
  <link rel="dns-prefetch" href="//qn12.tool.lu">
  <link rel="dns-prefetch" href="//qn13.tool.lu">
  <link rel="dns-prefetch" href="//qn14.tool.lu">
  <link rel="dns-prefetch" href="//analytics.tool.lu">
  <title>时间戳(Unix timestamp)转换工具 - 在线工具</title>
  <link rel="stylesheet" href="//s2.tool.lu/css/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="//s3.tool.lu/__/a5b2a3fd62df3d5d62a029e6d212697d.css">
  <link rel="stylesheet" href="//s4.tool.lu/__/035c6f1502ddf5736a8864776e6c036f.css">
  <script src="//s1.tool.lu/__/431ee51970b48d89c1b9b68608546091.js"></script>
</head>

<body>
  <div id="wrap">
    <div id="bdy">
      <div class="w">
        <link rel="stylesheet" href="//s2.tool.lu/__/308e0ab24020a4eb85d635a9de38a5f8.css">
        <div class="main">
          <div class="inner">
            <p><span class="form_left">现在：</span><a id="js_timestamp_now" href="javascript:;">-</a> 控制：<a
                id="js_timer_start" href="javascript:;"><i class="fas fa-play"></i> 开始</a> <a id="js_timer_stop"
                href="javascript:;" style="color: #E74C3C;"><i class="fas fa-stop"></i> 停止</a>
            </p>
            <p>
              <label class="form_left">时间戳</label>
              <input type="text" class="text" id="js_timestamp" name="timestamp">
              <select id="js_timestamp_unit" name="timestamp_unit">
                <option value="s">秒(s)</option>
                <option value="ms">毫秒(ms)</option>
              </select>
              <button id="js_convert_timestamp" type="button">转换 <i class="fas fa-angle-double-right"></i></button>
              <input type="text" class="text" id="js_datetime" name="datetime"> <span>北京时间</span>
            </p>
            <p>
              <label class="form_left">时间</label>
              <input type="text" class="text" id="js_datetime_o" name="datetime_o"> <span>北京时间</span>
              <button id="js_convert_datetime" type="button">转换 <i class="fas fa-angle-double-right"></i></button>
              <input type="text" class="text" id="js_timestamp_o" name="timestamp_o">
              <select id="js_timestamp_unit_o" name="timestamp_unit_o">
                <option value="s">秒(s)</option>
                <option value="ms">毫秒(ms)</option>
              </select>
            </p>
          </div>
        </div>
        <script src="//s.tool.lu/??js/dayjs/dayjs.min.js,js/dayjs/plugin/utc.js,js/timestamp/main.js"></script>
      </div>
    </div>
  </div>
</body>

</html>
